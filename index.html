<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Member | Premium Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        body { background-color: #050505; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(20, 20, 20, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .netflix-red { color: #E50914; }
        .bg-netflix-red { background-color: #E50914; }
        input:focus { border-color: #E50914; box-shadow: 0 0 15px rgba(229, 9, 20, 0.2); }
    </style>
</head>
<body class="text-white min-h-screen flex items-center justify-center p-6">

    <div class="max-w-md w-full z-10">
        <div class="text-center mb-10 animate__animated animate__fadeInDown">
            <h1 class="text-6xl font-black netflix-red tracking-tighter italic">NETFLIX</h1>
            <p class="text-zinc-500 text-[10px] tracking-[0.4em] uppercase mt-2 font-bold">Secure Database System</p>
        </div>

        <div class="glass p-8 rounded-[2.5rem] animate__animated animate__fadeInUp">
            <div class="space-y-6">
                <input type="text" id="kodeInput" maxlength="6" 
                    class="w-full bg-black/50 border border-zinc-800 rounded-2xl py-5 text-center text-3xl font-mono tracking-[0.4em] outline-none transition-all"
                    placeholder="000000">
                
                <button onclick="cariData()" 
                    class="w-full bg-netflix-red hover:bg-red-700 py-4 rounded-2xl font-black tracking-widest transition-all active:scale-95">
                    CEK DATA
                </button>
            </div>

            <div id="loading" class="hidden mt-8 text-center">
                <div class="inline-block w-8 h-8 border-[3px] border-red-600 border-t-transparent rounded-full animate-spin"></div>
            </div>

            <div id="resultCard" class="hidden mt-8 animate__animated animate__zoomIn">
                <div class="bg-zinc-900/50 p-6 rounded-3xl border border-zinc-800">
                    <div class="space-y-4 text-sm">
                        <div class="flex justify-between border-b border-zinc-800/50 pb-2">
                            <span class="text-zinc-500 text-[10px] uppercase">Pelanggan</span>
                            <span id="resNama" class="font-bold">---</span>
                        </div>
                        <div class="flex justify-between border-b border-zinc-800/50 pb-2">
                            <span class="text-zinc-500 text-[10px] uppercase">Paket</span>
                            <span id="resPaket" class="text-red-500 font-bold">---</span>
                        </div>
                        <div class="flex justify-between border-b border-zinc-800/50 pb-2">
                            <span class="text-zinc-500 text-[10px] uppercase">Exp Date</span>
                            <span id="resMasa" class="font-medium">---</span>
                        </div>
                        <div class="text-center pt-2">
                            <span id="resStatus" class="px-4 py-1 rounded-full text-[10px] font-black border">AKTIF</span>
                        </div>
                    </div>
                </div>
            </div>

            <p id="errorMsg" class="hidden mt-6 text-center text-red-500 text-xs font-bold animate__animated animate__shakeX">
                KODE TIDAK TERDAFTAR
            </p>
        </div>
    </div>

    <script>
        // Logika untuk menangkap variabel Vercel atau Fallback ke URL manual
        const CSV_URL = "" || "https://docs.google.com/spreadsheets/d/e/2PACX-1vQyfu7t_tPqHlZzGWeOSnAtemC0LfCsHfe8rV0QmYaQ2xyaOUTKvkMloIEw3Bd3Uptuz0BVKk1LZpqq/pub?gid=969553215&single=true&output=csv";

        async function cariData() {
            const kode = document.getElementById('kodeInput').value.trim();
            const card = document.getElementById('resultCard');
            const loading = document.getElementById('loading');
            const errorMsg = document.getElementById('errorMsg');

            if (kode.length < 6) return alert("Masukkan 6 digit kode!");

            card.classList.add('hidden');
            errorMsg.classList.add('hidden');
            loading.classList.remove('hidden');

            Papa.parse(CSV_URL, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    loading.classList.add('hidden');
                    const allData = results.data;
                    
                    // Kita cari dengan pembersihan spasi (trim) agar tidak error
                    const user = allData.find(row => {
                        // Mencari di kolom 'Kode' (pastikan di Sheet namanya "Kode")
                        return String(row.Kode || row.kode).trim() === kode;
                    });

                    if (user) {
                        document.getElementById('resNama').innerText = user.Nama || user.nama || "User";
                        document.getElementById('resPaket').innerText = user.Paket || user.paket || "-";
                        document.getElementById('resMasa').innerText = user["Masa Aktif"] || user.masa_aktif || "-";
                        
                        const status = (user.Status || user.status || "").toLowerCase();
                        const statusEl = document.getElementById('resStatus');
                        statusEl.innerText = status.toUpperCase();
                        
                        if(status === 'aktif') {
                            statusEl.className = "px-4 py-1 rounded-full text-[10px] font-black border border-green-500/20 bg-green-500/10 text-green-500";
                        } else {
                            statusEl.className = "px-4 py-1 rounded-full text-[10px] font-black border border-red-500/20 bg-red-500/10 text-red-500";
                        }

                        card.classList.remove('hidden');
                    } else {
                        errorMsg.classList.remove('hidden');
                    }
                },
                error: function() {
                    loading.classList.add('hidden');
                    alert("Gagal koneksi ke database publik Google.");
                }
            });
        }
    </script>
</body>
</html>
