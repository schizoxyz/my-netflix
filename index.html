<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Netflix Member Tracker</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">

<style>
    * { font-family: 'Inter', sans-serif; }

    body {
        background: radial-gradient(circle at top right, #1a1a1a 0%, #090909 40%, #000 100%);
        overflow-x: hidden;
    }

    .card {
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.06);
        backdrop-filter: blur(18px);
    }

    .progressFill {
        width: 0%;
        transition: all 1.5s cubic-bezier(0.22, 1, 0.36, 1);
    }

    /* Animasi Kilauan (Shimmer) pada Tombol */
    .btn-shimmer {
        position: relative;
        overflow: hidden;
    }

    .btn-shimmer::after {
        content: "";
        position: absolute;
        top: -50%;
        left: -60%;
        width: 30%;
        height: 200%;
        background: rgba(255, 255, 255, 0.25);
        transform: rotate(30deg);
        animation: shimmer 3s infinite;
    }

    @keyframes shimmer {
        0% { left: -60%; }
        35% { left: 140%; }
        100% { left: 140%; }
    }

    .fadeIn {
        animation: fade 0.5s ease forwards;
    }

    @keyframes fade {
        from { opacity: 0; transform: translateY(15px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
</head>

<body class="min-h-screen text-white px-4 py-8 flex justify-center">

<div class="w-full max-w-sm">

    <div class="text-center mb-10">
        <h1 class="text-6xl font-black tracking-tighter text-red-600 italic">NETFLIX</h1>
        <p class="text-[10px] text-white/30 uppercase tracking-[0.4em] mt-2 font-bold">
            Customer Status Portal
        </p>
    </div>

    <div class="space-y-3 mb-8">
        <div class="card rounded-2xl p-1">
            <input
                id="kodeInput"
                maxlength="6"
                placeholder="Masukkan Kode Akses"
                class="w-full h-14 bg-transparent px-4 text-center text-lg font-bold outline-none placeholder:text-white/20 uppercase tracking-widest"
            />
        </div>

        <button
            onclick="cariData()"
            class="btn-shimmer w-full h-14 rounded-2xl bg-red-600 font-black text-sm tracking-[0.2em] active:scale-[0.97] transition-all shadow-[0_0_25px_rgba(220,38,38,0.25)]"
        >
            CEK DATA
        </button>
    </div>

    <div id="loading" class="hidden text-center py-10">
        <div class="w-10 h-10 border-2 border-white/10 border-t-red-600 rounded-full animate-spin mx-auto"></div>
        <p class="text-[9px] text-white/40 uppercase tracking-[0.3em] mt-4">Menghubungkan Server...</p>
    </div>

    <div id="resultArea" class="hidden fadeIn">
        <div class="card rounded-[2.5rem] p-7 shadow-2xl">

            <div class="mb-7">
                <p class="text-[9px] uppercase tracking-[0.2em] text-white/30 mb-1 font-bold">Pemilik Akun</p>
                <h2 id="resNama" class="text-3xl font-black tracking-tight">---</h2>
            </div>

            <div class="bg-black/40 rounded-3xl p-5 mb-7 border border-white/5">
                <div class="flex justify-between items-center mb-3">
                    <span class="text-[9px] uppercase tracking-[0.2em] text-white/30 font-bold">Sisa Masa Aktif</span>
                    <span id="resSisaHari" class="text-xs font-black italic">---</span>
                </div>

                <div class="h-3 bg-white/5 rounded-full overflow-hidden p-[2px]">
                    <div id="progressBar" class="progressFill h-full rounded-full"></div>
                </div>
                
                <p class="text-[8px] text-white/10 mt-3 text-center uppercase tracking-widest font-medium">Auto-Sync Dashboard</p>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-7">
                <div class="p-4 bg-white/5 rounded-2xl border border-white/5">
                    <p class="text-[8px] uppercase tracking-[0.15em] text-white/30 mb-1 font-bold">Paket</p>
                    <p id="resPaket" class="text-[11px] font-bold text-white/90">---</p>
                </div>

                <div class="p-4 bg-white/5 rounded-2xl border border-white/5 text-right">
                    <p class="text-[8px] uppercase tracking-[0.15em] text-white/30 mb-1 font-bold">Berakhir</p>
                    <p id="resMasa" class="text-[11px] font-bold text-red-500">---</p>
                </div>
            </div>

            <a id="waLink" href="#" target="_blank" 
               class="flex items-center justify-center gap-3 w-full py-4 rounded-2xl border border-white/10 bg-white/5 hover:bg-white/10 transition-all active:scale-95">
                <span class="flex h-2 w-2 relative">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
                </span>
                <span class="text-[10px] font-black uppercase tracking-[0.2em]">Hubungi Admin</span>
            </a>

        </div>
    </div>

    <div id="errorMsg" class="hidden mt-6 card rounded-2xl p-5 text-center border-red-900/30">
        <p class="text-red-500 font-black text-[10px] uppercase tracking-[0.2em]">Kode Akses Tidak Valid</p>
    </div>

</div>

<script>
// --- KONFIGURASI ---
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQyfu7t_tPqHlZzGWeOSnAtemC0LfCsHfe8rV0QmYaQ2xyaOUTKvkMloIEw3Bd3Uptuz0BVKk1LZpqq/pub?gid=969553215&single=true&output=csv";
const ADMIN_NUMBER = "6281234567890"; // Ganti dengan nomor WhatsApp Anda

function cariData() {
    const inputField = document.getElementById("kodeInput");
    const kode = inputField.value.trim();
    const loading = document.getElementById("loading");
    const result = document.getElementById("resultArea");
    const error = document.getElementById("errorMsg");

    if(!kode) return;

    // Reset view
    result.classList.add("hidden");
    error.classList.add("hidden");
    loading.classList.remove("hidden");

    Papa.parse(CSV_URL, {
        download: true,
        header: true,
        complete: function(res) {
            loading.classList.add("hidden");

            // Cari user (Case insensitive)
            const user = res.data.find(row => 
                String(row.Kode || row.kode || row.KODE).trim().toUpperCase() === kode.toUpperCase()
            );

            if(user) {
                updateUI(user, kode);
                result.classList.remove("hidden");
            } else {
                error.classList.remove("hidden");
            }
        }
    });
}

function updateUI(user, kode) {
    document.getElementById("resNama").innerText = user.Nama || "Customer";
    document.getElementById("resPaket").innerText = user.Paket || "-";
    document.getElementById("resMasa").innerText = user["Masa Aktif"] || "-";

    // Hitung Sisa Hari
    const now = new Date();
    const exp = new Date(user["Masa Aktif"]);
    now.setHours(0,0,0,0);
    exp.setHours(0,0,0,0);

    const diff = Math.ceil((exp - now) / (1000 * 60 * 60 * 24));

    // Logika Bar: Semakin dekat expire, semakin PENUH (Bar berpatokan pada sisa hari)
    let percent = ((30 - diff) / 30) * 100;
    if(percent < 5) percent = 5; 
    if(percent > 100) percent = 100;

    const bar = document.getElementById("progressBar");
    const text = document.getElementById("resSisaHari");

    // Reset Bar untuk animasi masuk
    bar.style.width = "0%";
    
    setTimeout(() => {
        bar.style.width = percent + "%";
        
        if(diff > 14) {
            bar.className = "progressFill h-full rounded-full bg-green-500 shadow-[0_0_12px_rgba(34,197,94,0.4)]";
            text.className = "text-xs font-black italic text-green-400";
            text.innerText = diff + " Hari Lagi";
        } 
        else if(diff > 7) {
            bar.className = "progressFill h-full rounded-full bg-yellow-400 shadow-[0_0_12px_rgba(250,204,21,0.4)]";
            text.className = "text-xs font-black italic text-yellow-300";
            text.innerText = diff + " Hari Lagi";
        } 
        else if(diff > 0) {
            bar.className = "progressFill h-full rounded-full bg-red-600 shadow-[0_0_15px_rgba(220,38,38,0.5)]";
            text.className = "text-xs font-black italic text-red-500 animate-pulse";
            text.innerText = diff + " Hari Lagi";
        } 
        else if(diff === 0) {
            bar.style.width = "100%";
            bar.className = "progressFill h-full rounded-full bg-red-600 animate-pulse";
            text.className = "text-xs font-black italic text-red-500";
            text.innerText = "BERAKHIR HARI INI";
        } 
        else {
            bar.style.width = "100%";
            bar.className = "progressFill h-full rounded-full bg-zinc-700";
            text.className = "text-xs font-black italic text-white/30";
            text.innerText = "EXPIRED";
        }
    }, 200);

    // Setup Link WhatsApp
    const message = encodeURIComponent(`Halo Admin, saya ${user.Nama} (Kode: ${kode}). Ingin bertanya tentang paket Netflix saya.`);
    document.getElementById("waLink").href = `https://wa.me/${6282223031661}?text=${message}`;
}

// Input Enter Trigger
document.getElementById("kodeInput").addEventListener("keypress", function(e) {
    if(e.key === "Enter") {
        e.preventDefault();
        cariData();
    }
});
</script>

</body>
</html>
